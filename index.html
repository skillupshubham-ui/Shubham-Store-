<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shubham Store</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f5f5f5;
}

/* Navbar */
.navbar {
    background: #0a8f5a;
    color: white;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.navbar h1 {
    font-size: 22px;
}

.nav-links a {
    color: white;
    text-decoration: none;
    margin-left: 15px;
    font-size: 14px;
}

/* Hero Section */
.hero {
    background: linear-gradient(to right, #0a8f5a, #00c896);
    color: white;
    text-align: center;
    padding: 50px 20px;
}

.hero h2 {
    font-size: 28px;
    margin-bottom: 10px;
}

.hero p {
    font-size: 16px;
}

/* Categories */
.categories {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
    padding: 20px;
}

.category-box {
    background: white;
    padding: 20px;
    text-align: center;
    border-radius: 10px;
    font-weight: bold;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* Products */
.products {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

.product {
    background: white;
    border-radius: 10px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.product img {
    width: 100%;
    border-radius: 10px;
}

.product h3 {
    font-size: 16px;
    margin: 10px 0;
}

.product button {
    background: #25D366;
    border: none;
    padding: 10px;
    color: white;
    border-radius: 5px;
    cursor: pointer;
    width: 100%;
}

/* Footer */
.footer {
    background: #0a8f5a;
    color: white;
    text-align: center;
    padding: 10px;
    margin-top: 20px;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <h1>Shubham Store</h1>
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Men</a>
        <a href="#">Women</a>
        <a href="#">Footwear</a>
    </div>
</div>

<!-- Hero Section -->
<div class="hero">
    <h2>Best Quality, Best Price</h2>
    <p>Your one-stop shop for Fashion</p>
</div>

<!-- Categories -->
<div class="categories">
    <div class="category-box">Men's Wear</div>
    <div class="category-box">Women's Wear</div>
    <div class="category-box">Footwear</div>
</div>

<!-- Products -->
<div class="products">

    <div class="product">
        <img src="saree.jpg" alt="Saree" style="width:100%">
        <h3>Stylish Saree</h3>
        <button onclick="orderNow('Stylish Saree')">Order on WhatsApp</button>
    </div>

    <div class="product">
         <img src="shirt.jpg" alt="Shirt" style="width:100%">
        <h3>Men Shirt</h3>
        <button onclick="orderNow('Men Shirt')">Order on WhatsApp</button>
    </div>

    <div class="product">
        <img src="6483.jpg" alt="Footwear" style="width:100%">
        <h3>Footwear</h3>
        <button onclick="orderNow('Footwear')">Order on WhatsApp</button>
    </div>

</div>

<!-- Footer -->
<div class="footer">
    © 2026 Shubham Store | All Rights Reserved
</div>

<script>
function orderNow(productName) {
    let phone = "917838360013";
    let message = "Hello, I want to order " + productName;
    let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);
    window.open(url, '_blank');
}
</script>
</body>
</html>
